<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katurro | Bienvenido</title>
  <link rel="icon" href="assets/images/icono.png" type="image/png">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  
  <style>
    /* Estilos específicos para la landing page */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* Evitar scroll en la landing */
      background-color: #000;
    }
    
    .landing-container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .video-fondo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.7; /* Oscurecer un poco para que destaque el texto/logo */
    }

    .landing-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      animation: fadeIn 2s ease-in-out;
    }

    .landing-logo {
      max-width: 1200px;
      width: 100%;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    }

    .landing-title {
      color: #fff;
      font-size: 3.5rem;
      font-weight: 800;
      text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.7);
      margin: 0;
      font-family: 'Playfair Display', serif;
    }

    .btn-empezar {
      position: fixed;
      bottom: 50px;
      right: 50px;
      background-color: var(--vino);
      color: white;
      font-size: 1.5rem;
      font-weight: 600;
      padding: 1rem 3rem;
      border-radius: 50px;
      text-decoration: none;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      box-shadow: 0 4px 15px rgba(154, 16, 20, 0.6);
      z-index: 10;
      animation: fadeInOpacity 2s ease-in-out;
    }

    .btn-empezar:hover {
      background-color: transparent;
      border-color: var(--vino);
      color: white;
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(154, 16, 20, 0.8);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInOpacity {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>

<body>

  <div class="landing-container">
    <video class="video-fondo" autoplay muted loop playsinline>
      <source style="width: 200%; height: 200%; object-fit: cover;" src="assets/videos/inicio.mp4" type="video/mp4">=
    </video>
    <img src="assets/images/inicio-pagina.png" alt="Katurro Logo" class="landing-logo">
    <div class="landing-content">
      
    </div>
    <a href="pages/introduccion.html" class="btn-empezar">Comenzar experiencia cafetera</a>
  </div>

</body>
</html>
